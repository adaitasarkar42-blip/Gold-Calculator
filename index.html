<!DOCTYPE html>
<html lang="bn">
<head>

<meta charset="UTF-8">
<title>Gourob Jewellers</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:15px;
}

.header{
background:white;
max-width:900px;
margin:auto;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px #ccc;
text-align:center;
}

.container{
display:flex;
gap:15px;
max-width:900px;
margin:20px auto;
}

.box{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px #ccc;
width:50%;
}

input,button{
width:100%;
padding:10px;
margin-top:8px;
}

button{
background:#ffd700;
border:none;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

td,th{
border:1px solid #ccc;
padding:6px;
text-align:center;
}

th{
background:#ffd700;
}

.bill{
padding:10px;
border:1px dashed #000;
margin-top:10px;
}

.history{
max-width:900px;
margin:auto;
background:white;
padding:10px;
margin-top:20px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="header">

<h2>Gourob Jewellers</h2>
Owner: Gourob Biswas

</div>

<div class="container">

<div class="box">

<h3>Customer Bill</h3>

<input id="custname" placeholder="Customer Name">

<input id="goldprice" placeholder="Gold Price per gram">

<input id="weight" placeholder="Gold Weight gram">

<input id="making" placeholder="Making Charge %">

<button onclick="generateBill()">Generate Bill</button>

<div id="bill" class="bill"></div>

<button onclick="printBill()">Print PDF</button>

</div>


<div class="box">

<h3>আনা → গ্রাম লিস্ট</h3>

<table>

<tr>
<th>আনা</th>
<th>গ্রাম</th>
</tr>

<script>

let ana=[1,1.5,2,2.5,3,3.5,4,4.5,5,5.5,6,6.5,7,7.5,8,8.5,9,9.5,10,10.5,11,11.5,12,12.5,13,13.5,14,14.5,15];

ana.forEach(a=>{
document.write("<tr><td>"+a+" আনা</td><td>"+(a*0.728).toFixed(3)+" g</td></tr>");
});

</script>

</table>

</div>

</div>


<div class="history">

<h3>Saved Bills</h3>

<ul id="history"></ul>

</div>


<script>

function generateBill(){

let name=document.getElementById("custname").value;

let price=parseFloat(document.getElementById("goldprice").value);

let w=parseFloat(document.getElementById("weight").value);

let m=parseFloat(document.getElementById("making").value);

let gold=price*w;

let makingCharge=gold*(m/100);

let total=gold+makingCharge;

let html="";

html+="<b>Gourob Jewellers</b><br>";

html+="Customer: "+name+"<br>";

html+="Gold Price: ₹"+price+"<br>";

html+="Weight: "+w+" g<br>";

html+="Gold Value: ₹"+gold.toFixed(0)+"<br>";

html+="Making: ₹"+makingCharge.toFixed(0)+"<br>";

html+="<b>Total: ₹"+total.toFixed(0)+"</b><br>";

html+="Date: "+new Date().toLocaleDateString();

document.getElementById("bill").innerHTML=html;

}


function printBill(){

let billText=document.getElementById("bill").innerHTML;

let bills=JSON.parse(localStorage.getItem("bills"))||[];

bills.push(billText);

localStorage.setItem("bills",JSON.stringify(bills));

window.print();

}


function loadBills(){

if(navigator.onLine){

let bills=JSON.parse(localStorage.getItem("bills"))||[];

let list=document.getElementById("history");

list.innerHTML="";

bills.forEach(b=>{
let li=document.createElement("li");
li.innerHTML=b;
list.appendChild(li);
});

}else{

document.getElementById("history").innerHTML="Internet না থাকায় বিল দেখা যাচ্ছে না";

}

}

window.onload=loadBills;

</script>

</body>
</html>
