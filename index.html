    <script>
      let anaList=[1,1.5,2,2.5,3,3.5,4,4.5,5,5.5,6,6.5,7,7.5,8,8.5,9,9.5,10,10.5,11,11.5,12,12.5,13,13.5,14,14.5,15];
      anaList.forEach(a=>{

</div>

<script>

function updateDateTime(){
  let now=new Date();
  document.getElementById("datetime").innerHTML=
    now.toLocaleDateString('bn-IN')+" | "+
    now.toLocaleTimeString('bn-IN');
}
setInterval(updateDateTime,1000);
updateDateTime();

function goldCalc(){
  let w=parseFloat(weight.value);
  let p=parseFloat(purity.value);
  if(isNaN(w)||isNaN(p)){
    goldResult.innerHTML="⚠️ সব ঘর পূরণ করুন";
    return;
  }
  let pure=w*(p/100);
  let k22=pure/0.916;
  goldResult.innerHTML=
    "২৪ ক্যারেট: <b>"+pure.toFixed(2)+" g</b><br>"+
    "২২ ক্যারেট: <b>"+k22.toFixed(2)+" g</b>";
}

function priceCalc(){
  let r=parseFloat(rate.value);
  let g=parseFloat(grams.value);
  if(isNaN(r)||isNaN(g)){
    priceResult.innerHTML="⚠️ সব ঘর পূরণ করুন";
    return;
  }

  let base=r*g;
  let making=base*0.08;
  let total=base+making;

  priceResult.innerHTML=
    "সোনার দাম: ₹"+base.toFixed(0)+"<br>"+
    "মেকিং চার্জ (8%): ₹"+making.toFixed(0)+"<br>"+
    "<b>মোট দাম: ₹"+total.toFixed(0)+"</b>";
}

</script>

</body>
</html>
