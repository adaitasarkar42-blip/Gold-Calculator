<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gold Calculator</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
margin:0;
padding:10px;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:8px;
box-shadow:0 0 5px rgba(0,0,0,0.1);
}

h2{
text-align:center;
}

input{
width:100%;
padding:8px;
margin:5px 0 10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#f4c200;
border:none;
border-radius:5px;
font-weight:bold;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

th{
background:#f4c200;
}

</style>

</head>

<body>

<div class="container">

<div class="card">
<h2>❤️ Gourob Biswas ❤️</h2>
</div>

<div class="card">

<h3>Gold Calculator</h3>

<label>গহনার ওজন (গ্রাম)</label>
<input type="number" id="goldWeight" placeholder="যেমন: 10">

<label>সোনার বিশুদ্ধতা (%)</label>
<input type="number" id="goldPurity" placeholder="যেমন: 86">

<button onclick="calculateGold()">Calculate</button>

<table>

<tr>
<th>24K</th>
<th>22K</th>
<th>21K</th>
<th>20K</th>
<th>18K</th>
</tr>

<tr>
<td id="res24">-</td>
<td id="res22">-</td>
<td id="res21">-</td>
<td id="res20">-</td>
<td id="res18">-</td>
</tr>

</table>

</div>

<div class="card">

<h3>Gold Price</h3>

<label>আজকের ২৪ ক্যারেট দাম (প্রতি গ্রাম)</label>
<input type="number" id="goldPrice" placeholder="10000">

<label>কত গ্রাম সোনা</label>
<input type="number" id="goldGram" placeholder="9">

<button onclick="calculatePrice()">Calculate</button>

<table>

<tr>
<th>24K</th>
<th>22K</th>
</tr>

<tr>
<td id="price24">-</td>
<td id="price22">-</td>
</tr>

</table>

</div>

</div>

<script>

function calculateGold(){

let weight=parseFloat(document.getElementById("goldWeight").value);
let purity=parseFloat(document.getElementById("goldPurity").value);

if(isNaN(weight)||isNaN(purity)){
alert("সঠিক মান লিখুন");
return;
}

let pureGold=(weight*purity)/100;

let gold24=pureGold/1;
let gold22=pureGold/0.916;
let gold21=pureGold/0.875;
let gold20=pureGold/0.833;
let gold18=pureGold/0.750;

document.getElementById("res24").innerHTML=gold24.toFixed(3)+" g";
document.getElementById("res22").innerHTML=gold22.toFixed(3)+" g";
document.getElementById("res21").innerHTML=gold21.toFixed(3)+" g";
document.getElementById("res20").innerHTML=gold20.toFixed(3)+" g";
document.getElementById("res18").innerHTML=gold18.toFixed(3)+" g";

}

function calculatePrice(){

let price=parseFloat(document.getElementById("goldPrice").value);
let gram=parseFloat(document.getElementById("goldGram").value);

if(isNaN(price)||isNaN(gram)){
alert("সঠিক মান লিখুন");
return;
}

let total24=price*gram;
let total22=(price*0.916)*gram;

document.getElementById("price24").innerHTML="₹"+total24.toFixed(0);
document.getElementById("price22").innerHTML="₹"+total22.toFixed(0);

}

</script>

</body>
</html>
