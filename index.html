<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>Gourob Jewellers</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:15px;
}

.header{
background:#fff;
max-width:760px;
margin:auto;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px #ccc;
text-align:center;
}

.container{
display:flex;
justify-content:space-between;
gap:10px;
max-width:760px;
margin:20px auto;
}

.box{
background:#fff;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px #ccc;
width:49%;
}

input,button{
width:100%;
padding:10px;
margin-top:10px;
font-size:15px;
}

button{
background:#ffd700;
border:none;
font-weight:bold;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ccc;
padding:6px;
text-align:center;
}

th{
background:#ffd700;
}

.full{
max-width:760px;
margin:20px auto;
background:#fff;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px #ccc;
}

</style>

</head>

<body>

<div class="header">

<h2>❤️ Gourob Biswas ❤️</h2>

</div>


<div class="container">

<div class="box">

<h2>🪙 Gold Calculator</h2>

<label>গহনার ওজন (গ্রাম)</label>
<input type="number" id="weight" placeholder="যেমন: 10">

<label>সোনার পিউরিটি (%)</label>
<input type="number" id="purity" placeholder="যেমন: 86">

<button onclick="goldCalc()">Calculate</button>

<div id="goldResult"></div>

</div>


<div class="box">

<h2>💰 Gold Price</h2>

<label>আজকের ২৪ ক্যারেট দাম (₹ / g)</label>
<input type="number" id="rate" placeholder="যেমন: 15000">

<label>কত গ্রাম সোনা</label>
<input type="number" id="grams" placeholder="যেমন: 5">

<button onclick="priceCalc()">Calculate</button>

<div id="priceResult"></div>

</div>

</div>


<div class="full">

<h2>⚖️ আনা → গ্রাম লিস্ট</h2>

<table>

<tr>
<th>আনা</th>
<th>গ্রাম</th>
</tr>

<script>

let anaList=[1,1.5,2,2.5,3,3.5,4,4.5,5,5.5,6,6.5,7,7.5,8,8.5,9,9.5,10,10.5,11,11.5,12,12.5,13,13.5,14,14.5,15];

anaList.forEach(a=>{
document.write("<tr><td>"+a+" আনা</td><td>"+(a*0.728).toFixed(3)+" g</td></tr>");
});

</script>

</table>

</div>


<script>

function goldCalc(){

let w=parseFloat(document.getElementById("weight").value);

let p=parseFloat(document.getElementById("purity").value);

if(isNaN(w)||isNaN(p)){
document.getElementById("goldResult").innerHTML="⚠️ সব ঘর পূরণ করুন";
return;
}

let pure=w*(p/100);

let k24=pure;
let k22=pure/0.916;
let k21=pure/0.875;
let k20=pure/0.833;
let k18=pure/0.750;

let html="";

html+="<table>";

html+="<tr>";
html+="<th>24K</th>";
html+="<th>22K</th>";
html+="<th>21K</th>";
html+="<th>20K</th>";
html+="<th>18K</th>";
html+="</tr>";

html+="<tr>";

html+="<td>"+k24.toFixed(3)+" g</td>";
html+="<td>"+k22.toFixed(3)+" g</td>";
html+="<td>"+k21.toFixed(3)+" g</td>";
html+="<td>"+k20.toFixed(3)+" g</td>";
html+="<td>"+k18.toFixed(3)+" g</td>";

html+="</tr>";

html+="</table>";

document.getElementById("goldResult").innerHTML=html;

}



function priceCalc(){

let r=parseFloat(document.getElementById("rate").value);
let g=parseFloat(document.getElementById("grams").value);

if(isNaN(r)||isNaN(g)){
document.getElementById("priceResult").innerHTML="⚠️ সব ঘর পূরণ করুন";
return;
}

let rate22=r*0.916;

let gold24=r*g;
let making24=gold24*0.08;
let total24=gold24+making24;

let gold22=rate22*g;
let making22=gold22*0.08;
let total22=gold22+making22;

let html="";

html+="<table>";

html+="<tr><th>24K</th><th>22K</th></tr>";

html+="<tr>";

html+="<td>সোনার দাম: ₹"+gold24.toFixed(0)+"<br>মেকিং চার্জ (8%): ₹"+making24.toFixed(0)+"<br><b>মোট দাম: ₹"+total24.toFixed(0)+"</b></td>";

html+="<td>সোনার দাম: ₹"+gold22.toFixed(0)+"<br>মেকিং চার্জ (8%): ₹"+making22.toFixed(0)+"<br><b>মোট দাম: ₹"+total22.toFixed(0)+"</b></td>";

html+="</tr>";

html+="</table>";

document.getElementById("priceResult").innerHTML=html;

}

</script>

</body>
</html>
