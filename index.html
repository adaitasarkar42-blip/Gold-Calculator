<script>


function updateDateTime(){

var now=new Date();

document.getElementById("datetime").innerHTML=
now.toLocaleDateString('bn-IN')+" | "+now.toLocaleTimeString('bn-IN');

}

setInterval(updateDateTime,1000);

updateDateTime();



function goldCalc(){

var w=parseFloat(document.getElementById("weight").value);

var p=parseFloat(document.getElementById("purity").value);

if(isNaN(w)||isNaN(p)){

document.getElementById("goldResult").innerHTML="⚠️ সব ঘর পূরণ করুন";

return;

}

var pure=w*(p/100);

var k22=pure/0.916;

document.getElementById("goldResult").innerHTML=
"২৪ ক্যারেট: <b>"+pure.toFixed(2)+" g</b><br>"+
"২২ ক্যারেট: <b>"+k22.toFixed(2)+" g</b>";

}



function priceCalc(){

var r=parseFloat(document.getElementById("rate").value);

var g=parseFloat(document.getElementById("grams").value);

if(isNaN(r)||isNaN(g)){

document.getElementById("priceResult").innerHTML="⚠️ সব ঘর পূরণ করুন";

return;

}

var rate22=r*0.916;

var gold24=r*g;

var making24=gold24*0.08;

var total24=gold24+making24;

var gold22=rate22*g;

var making22=gold22*0.08;

var total22=gold22+making22;



var html="";

html+="<table>";

html+="<tr><th>24K</th><th>22K</th></tr>";

html+="<tr>";

html+="<td>";

html+="সোনার দাম: ₹"+gold24.toFixed(0)+"<br>";

html+="মেকিং চার্জ (8%): ₹"+making24.toFixed(0)+"<br>";

html+="<b>মোট দাম: ₹"+total24.toFixed(0)+"</b>";

html+="সোনার দাম: ₹"+gold22.toFixed(0)+"<br>";

html+="মেকিং চার্জ (8%): ₹"+making22.toFixed(0)+"<br>";

html+="<b>মোট দাম: ₹"+total22.toFixed(0)+"</b>";

html+="</td>";

html+="</tr>";

html+="</table>";

document.getElementById("priceResult").innerHTML=html;

}

</script>
